<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdul Moiz (A-Moiz)</title>
    <link href="style.css" rel="stylesheet" />
    <script src="script.js" defer></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <h1 class="center">TV Show Episodes</h1>
    <p class="center" id="display-info"></p>

    <div class="filter-container">
      <label>
        <input
          type="search"
          id="search"
          name="search"
          placeholder="Search episodes..."
        />
      </label>

      <select id="ep-select">
        <option value="all">Show all</option>
      </select>
    </div>

    <div class="ep-container">
      <template id="ep-card">
        <section class="ep-section">
          <h3 class="ep-title">Title</h3>
          <img class="ep-img" />
          <p class="ep-summary">Summary</p>
        </section>
      </template>
    </div>

    <footer class="center">
      <p>
        This data has originally come from
        <span
          ><a href="https://www.tvmaze.com" target="_blank">TVMaze.com</a></span
        >
      </p>
    </footer>
  </body>
</html>
