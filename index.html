<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Abdul Moiz (A-Moiz)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <h1 class="main-title">TV Show Episodes</h1>
    <div id="root"></div>

    <!-- Search + counter -->
    <div class="controls">
      <input id="searchInput" type="text" placeholder="Search episodes..." />
      <p id="episodeCount"></p>
    </div>

    <!-- Episode selector -->
      <select id="episodeSelect">
        <option value="">Show all</option>
      </select>
    </div>

    <!-- Main Container for Episode Views -->
    <div id="main-container" class="main-container"></div>

    <!-- Footer Section -->
    <footer>
      <p>
        This data has originally come from
        <span
          ><a href="https://www.tvmaze.com" target="_blank">TVMaze.com</a></span
        >
      </p>
    </footer>

    <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->
    <script src="episodes.js"></script>

    <!-- Loads YOUR javascript code -->
    <script src="script.js" defer></script>
  </body>
</html>
